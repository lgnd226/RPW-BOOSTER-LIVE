# ════════════════════════════════════════════════════════════════════════════
# RPW BOOSTER — Render Blueprint
#
# ONE-CLICK DEPLOY:
#   https://dashboard.render.com → New → Blueprint → lgnd226/RPW-BOOSTER-LIVE
# ════════════════════════════════════════════════════════════════════════════

databases:
  - name: rpw-booster-db
    databaseName: rpwbooster
    plan: free
    region: singapore

services:
  - type: web
    name: rpw-booster-api
    env: node
    region: singapore
    plan: free
    healthCheckPath: /api/healthz
    autoDeploy: true
    buildCommand: >-
      pip3 install --break-system-packages --quiet curl_cffi requests &&
      npm install -g pnpm@9 &&
      pnpm install --no-frozen-lockfile --store-dir /tmp/pnpm-store &&
      BASE_PATH=/ pnpm --filter @workspace/lara-web run build &&
      pnpm --filter @workspace/api-server run build &&
      mkdir -p dist public &&
      cp -r artifacts/api-server/dist/. dist/ &&
      cp    artifacts/api-server/fb_helper.py fb_helper.py &&
      cp -r artifacts/lara-web/dist/public/. public/
    startCommand: node --enable-source-maps dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: rpw-booster-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
